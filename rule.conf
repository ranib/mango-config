# ==========================================================================
# MangoWM Window Rules & Layer Configuration Modules (rules.conf)
# ==========================================================================

# ── 1. Core UI & System Dialog Float Mapping ──────────────────────────────
windowrule=float,pavucontrol
windowrule=float,blueman-manager
windowrule=float,nm-connection-editor
windowrule=float,satty
windowrule=float,xfce-polkit
windowrule=float,clash-verge
windowrule=float,yesplaymusic

# ── 2. Overlay & Security Priority Layers ─────────────────────────────────
windowrule=overlay,veila
windowrule=isoverlay:1,appid:^com.gabm.satty$

# ── 3. Native File Pickers & System Portal Wrappers ────────────────────────
windowrule=float,appid:xdg-desktop-portal-gtk,title:打开本地仓库
windowrule=float,appid:xdg-desktop-portal-gtk,title:打开文件
windowrule=float,title:选择文件
windowrule=float,title:打开文件
windowrule=float,title:图片查看器
windowrule=float,title:预览
windowrule=float,title:图片查看

# ── 4. Floating Dimension Controls (1500x900 Sizing Layouts) ──────────────
windowrule=width:1500,height:900,appid:blueman-manager
windowrule=width:1500,height:900,appid:clash-verge
windowrule=width:1500,height:900,appid:yesplaymusic
windowrule=isfloating:1,width:1500,height:900,appid:baidunetdisk,title:百度网盘

# ── 5. Automated Target Workspace Tag Assignments ─────────────────────────
windowrule=tags:2,appid:mpv
windowrule=tags:3,appid:QQ
windowrule=tags:4,appid:Google-chrome
windowrule=tags:5,appid:org.telegram.desktop
windowrule=tags:6,appid:obs
windowrule=istagsilent:1,appid:org.telegram.desktop

# ── 6. Application Tiling Scale Corrections ───────────────────────────────
windowrule=force_fakemaximize:1,appid:org.gnome.SystemMonitor
windowrule=force_fakemaximize:1,appid:org.gnome.gThumb
windowrule=force_fakemaximize:1,appid:firefox
windowrule=force_fakemaximize:1,appid:org.telegram.desktop

# ── 7. Global Application IPC Hooks ───────────────────────────────────────
windowrule=globalkeybinding:ctrl+alt-o,appid:com.obsproject.Studio
windowrule=globalkeybinding:ctrl+alt-n,appid:com.obsproject.Studio

# ── 8. System Layer Interface Animations & Shadows ────────────────────────
layerrule=noshadow:1,layer_name:swaync-control-center
layerrule=noshadow:1,layer_name:swaync-notification-window
layerrule=animation_type_open:fade,layer_name:swaync-control-center
layerrule=animation_type_close:fade,layer_name:swaync-control-center

layerrule=animation_type_open:fade,layer_name:swayosd
layerrule=animation_type_close:fade,layer_name:swayosd

layerrule=animation_type_open:zoom,layer_name:launcher
layerrule=animation_type_close:zoom,layer_name:launcher
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
