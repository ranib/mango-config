# ==========================================================================
# MangoWM Multi-Monitor Hardware Screen Coordinates (monitor.conf)
# ==========================================================================

# ── Monitor 1: Primary Sceptre 27" 4K Desktop Display ────────────────────
# Spans 3840x2160 pixels. Configured with a crisp 1.5 system scaling factor.
monitorrule=name:DP-1,width:3840,height:2160,refresh:60,x:0,y:0,scale:1.5

# ── Monitor 2: Secondary Acer 23" 1080p Desktop Display ──────────────────
# Placed exactly to the right of your virtual 4K canvas limit (3840 / 1.5 = 2560).
# Scale is kept at a clean 1.0 factor for unscaled 1080p asset density.
monitorrule=name:HDMI-A-3,width:1920,height:1080,refresh:60,x:2560,y:0,scale:1


