# ==========================================================================
# MangoWM Core Master Window Manager Configuration
# ==========================================================================

# ── 1. External Layout & Bindings Modules ─────────────────────────────────
# Pulls in your key shortcuts safely. This prevents your core file from becoming 
# cluttered with long hotkey declarations.
source=~/.config/mango/bind.conf

# ── 2. Master Session Autostart Routine ───────────────────────────────────
# Point to your exact audited script nested inside your scripts directory.
# Uses 'exec' to ensure background tools reload cleanly on server resets.
exec=bash ~/.config/mango/scripts/autostart.sh

# ── 3. Appearance & Structural Borders ───────────────────────────────────
# Native layout measurements for window frames, sizing, and colors.
border_width=2
gaps_inner=10
gaps_outer=15

# Color states matching your default active window layouts
# Format: 0xRRGGBBAA
focus_color=0x00bcd4ff      # Vibrant Cyan matching your Fastfetch & SDDM accents
unfocus_color=0x1e222aff    # Muted dark slate matching your window overlays

# ── 4. Visual Effects & SceneFX Customizations ────────────────────────────
# Advanced window decorations utilizing hardware acceleration.
corner_radius=8
shadows=true
shadow_blur=15
shadow_color=rgba(0, 0, 0, 0.4)

# Native window blur options (Note: keep blur_enabled=false if you want raw speed)
blur_enabled=false
blur_size=8
blur_passes=2

# ── 5. Animation Profiles ────────────────────────────────────────────────
# Smooth layout transformations for opens, closes, and workspace tag switches.
animation_enabled=true
animation_duration_open=300
animation_duration_close=250
animation_duration_tag=400

# ── 6. Advanced Input & Peripheral Controls ──────────────────────────────
# Global input settings for keyboards, pointers, and tracking pads.
input_kb_layout=us
input_follow_mouse=1
input_sensitivity=0.0
input_repeat_rate=25
input_repeat_delay=600

# Trackpad precise features
input_tap_to_click=true
input_natural_scrolling=false

# ── 7. Monitor & Display Layout Management ────────────────────────────────
# Explicitly declares scale factors and resolutions for connected displays.
# Format: monitor=NAME,RESOLUTION,POSITION,SCALE
monitor=,preferred,auto,1

# ── 8. Rigid Scratchpad Configurations ────────────────────────────────────
# Defines named overlay workspaces that toggle on top of your desktop nodes.
scratchpad_width=0.70
scratchpad_height=0.70

# ── 9. Window, Layer, and Tag Filtering Rules ────────────────────────────
# Global filtering hooks to manage specific layout assignments automatically.

# Force interactive system utilities, control panels, and screenshot editors to float
windowrule=float,pavucontrol
windowrule=float,blueman-manager
windowrule=float,nm-connection-editor
windowrule=float,satty

# Force the secure locker to render cleanly on top of all underlying tiling nodes
windowrule=overlay,veila

# Layer rules to animate system interfaces smoothly
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_open:slide,layer_name:waybar

# run autostart, bind, rules & tag
exec-once=~/.config/mango/scripts/autostart.sh
source=~/.config/mango/bind.conf
source=~/.config/mango/rules.conf
source=~/.config/mango/tag.conf
