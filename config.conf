# ==========================================================================
# MangoWM Core Master Window Manager Configuration (config.conf)
# ==========================================================================

# ── 1. External Module Imports ────────────────────────────────────────────
# Load all layout configurations and key bindings first so the environment is
# completely ready before any user application initializes.
source=~/.config/mango/bind.conf
source=~/.config/mango/tag.conf
source=~/.config/mango/rules.conf

# ── 2. Master Session Autostart Routine ───────────────────────────────────
# Kicks off your audited background scripts on initialization.
exec-once=bash ~/.config/mango/scripts/autostart.sh

# ── 3. Appearance & Structural Borders ───────────────────────────────────
border_width=2
gaps_inner=10
gaps_outer=15

# Color states matching your default active window layouts (Format: 0xRRGGBBAA)
focus_color=0x00bcd4ff      # Vibrant Cyan matching your Fastfetch & SDDM accents
unfocus_color=0x1e222aff    # Muted dark slate matching your window overlays

# ── 4. Visual Effects & SceneFX Customizations ────────────────────────────
corner_radius=8
shadows=true
shadow_blur=15
shadow_color=rgba(0, 0, 0, 0.4)

# Native window blur options (Keep blur_enabled=false for raw rendering speed)
blur_enabled=false
blur_size=8
blur_passes=2

# ── 5. Animation Profiles ────────────────────────────────────────────────
animation_enabled=true
animation_duration_open=300
animation_duration_close=250
animation_duration_tag=400

# ── 6. Advanced Input & Peripheral Controls ──────────────────────────────
input_kb_layout=us
input_follow_mouse=1
input_sensitivity=0.0
input_repeat_rate=25
input_repeat_delay=600

# Trackpad precise features
input_tap_to_click=true
input_natural_scrolling=false

# ── 7. Monitor & Display Layout Management ────────────────────────────────
monitor=,preferred,auto,1

# ── 8. Rigid Scratchpad Configurations ────────────────────────────────────
scratchpad_width=0.70
scratchpad_height=0.70

# ── 9. Global Environmental Scaling Rules ────────────────────────────────
# Theme integration forcing Qt apps to match your dark GTK layouts cleanly
env=QT_QPA_PLATFORMTHEME,qt5ct
env=QT_QPA_PLATFORM,Wayland;xcb
env=QT_AUTO_SCREEN_SCALE_FACTOR,1
env=QT_WAYLAND_FORCE_DPI,140
