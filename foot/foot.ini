# ==========================================================================
# Foot Terminal Configuration — Nested Repository Asset File
# ==========================================================================

# Core Font Layout Definitions
font=JetBrainsMono Nerd Font:size=11
font-bold=JetBrainsMono Nerd Font:style=Bold:size=11
font-italic=JetBrainsMono Nerd Font:style=Italic:size=11
font-bold-italic=JetBrainsMono Nerd Font:style=Bold Italic:size=11

# Frame Buffers and Layout Adjustments
pad=12x12
shell=/usr/bin/bash
term=foot
initial-window-size-chars=100x26

[scrollback]
lines=5000
multiplier=3.0

[cursor]
style=block
color=1e222a 00bcd4
blink=yes

[mouse]
hide-when-typing=yes

[colors]
alpha=0.92
background=1e222a
foreground=c8ccd4

# Standard Terminal ANSI 16 Palette 
regular0=1e222a  # black
regular1=e06c75  # red
regular2=98c379  # green
regular3=d19a66  # yellow
regular4=61afef  # blue
regular5=c678dd  # magenta
regular6=00bcd4  # cyan
regular7=abb2bf  # white

bright0=545862   # bright black
bright1=e06c75   # bright red
bright2=98c379   # bright green
bright3=d19a66   # bright yellow
bright4=61afef   # bright blue
bright5=c678dd   # bright magenta
bright6=00bcd4   # bright cyan
bright7=ffffff   # bright white
