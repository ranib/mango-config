# ==========================================================================
# MangoWM Core Master Keybindings Configuration (bind.conf)
# ==========================================================================

# ── 1. Modifier Definitions ───────────────────────────────────────────────
# Define your master modifier keys clearly
# Alt key (Mod1) or Super/Windows key (Mod4)
# Mango default mappings rely heavily on ALT for core wm layout navigation.
# We will use SUPER for launching user applications.

# ── 2. Core Core Terminal & File Management Mappings ──────────────────────
# Native Wayland applications. Uses explicit paths matching your nested repo.

# Launch your highly optimized Foot terminal
bind=SUPER,Return,spawn,foot

# Launch Thunar Graphical File Manager
bind=ALT,t,spawn,thunar

# Launch Yazi Terminal File Manager cleanly inside a native Foot window instance
bind=SUPER,y,spawn,foot -e yazi

# ── 3. Application Menus & Selectors (Rofi Rules) ─────────────────────────
# Forces Rofi to strictly read themes from your nested repository directories.

# Global Rofi Application Launcher (Using your custom layout rasi file)
bind=ALT,space,spawn,rofi -show drun -theme ~/.config/mango/rofi/config.rasi

# Rofi Custom Wallpaper Picker GUI Script
bind=SUPER,w,spawn,bash ~/.config/mango/scripts/wallpaper_switcher.sh

# Interactive Emojis Picker Menu via Rofimoji
bind=SUPER,period,spawn,rofimoji --theme ~/.config/mango/rofi/config.rasi

# Interactive Clipboard Manager (Pulls historical buffers via cliphist)
bind=SUPER,v,spawn,cliphist list | rofi -dmenu -p "Clipboard" -theme ~/.config/mango/rofi/config.rasi | cliphist decode | wl-copy

# ── 4. Session Locking & System Power Overlays ────────────────────────────
# Point directly to your custom scripts and handle relative asset paths.

# Trigger your universal text-based relative path wlogout session menu
bind=SUPER_SHIFT,e,spawn,wlogout -C ~/.config/mango/wlogout/layout -s ~/.config/mango/wlogout/style.css

# Lock your active environment instantly using your dynamic lockscreen script
bind=SUPER,Escape,spawn,bash ~/.config/mango/scripts/wallpaper_lockscreen.sh

# ── 5. System Audio & Brightness Controls (Hardware Bindings) ─────────────
# Synchronized bindings to control your SwayOSD overlays and hardware drivers.

# Volume Audio Adjustments (Using pamixer linked directly to SwayOSD overlays)
bind=,XF86AudioRaiseVolume,spawn,swayosd-client --output-volume raise
bind=,XF86AudioLowerVolume,spawn,swayosd-client --output-volume lower
bind=,XF86AudioMute,spawn,swayosd-client --output-volume mute

# Laptop Screen Brightness Control (Using brightnessctl linked to SwayOSD)
bind=,XF86MonBrightnessUp,spawn,swayosd-client --brightness raise
bind=,XF86MonBrightnessDown,spawn,swayosd-client --brightness lower

# ── 6. Advanced Region Screenshot Capture ─────────────────────────────────
# The golden trio: Grim captures, Slurp targets, Satty edits/annotates.

# Capture a selected region and launch the Satty annotation suite instantly
bind=,Print,spawn,grim -g "$(slurp)" - | satty --filename - --fullscreen

# ── 7. MangoWM Layout Architecture & Client Controls ──────────────────────
# Standard dwl-based core tiling hotkeys to manipulate active nodes.

# Kill/Close active application client
bind=ALT,q,killclient,

# Quit / Terminate your active MangoWM compositor layout session
bind=SUPER_SHIFT,q,spawn,mango-msg exit

# Shift focus across windows inside active screen layouts
bind=ALT,Left,focusdirection,left
bind=ALT,Right,focusdirection,right
bind=ALT,Up,focusdirection,up
bind=ALT,Down,focusdirection,down

# Move / Swap position of windows across layouts
bind=ALT_SHIFT,Left,movetoworkspace,left
bind=ALT_SHIFT,Right,movetoworkspace,right

# ── 8. Virtual Workspace Tags Navigation ──────────────────────────────────
# Mango WM handles layouts using numeric Tags (1-9) rather than standard workspaces.

bind=ALT,1,viewtag,1
bind=ALT,2,viewtag,2
bind=ALT,3,viewtag,3
bind=ALT,4,viewtag,4
bind=ALT,5,viewtag,5

bind=ALT_SHIFT,1,movetoworkspace,1
bind=ALT_SHIFT,2,movetoworkspace,2
bind=ALT_SHIFT,3,movetoworkspace,3
bind=ALT_SHIFT,4,movetoworkspace,4
bind=ALT_SHIFT,5,movetoworkspace,5
